app-id: io.github.hthienloc.JigsawQt
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: main.py
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: jigsaw-qt
    buildsystem: simple
    build-commands:
      - install -D main.py /app/bin/jigsaw-qt
      - install -D board.py /app/bin/board.py
      - install -D piece.py /app/bin/piece.py
      - install -D config.py /app/bin/config.py
      - install -D LICENSE /app/share/licenses/io.github.hthienloc.JigsawQt/LICENSE
      - install -D io.github.hthienloc.JigsawQt.desktop /app/share/applications/io.github.hthienloc.JigsawQt.desktop
      - install -D io.github.hthienloc.JigsawQt.metainfo.xml /app/share/metainfo/io.github.hthienloc.JigsawQt.metainfo.xml
      - install -D io.github.hthienloc.JigsawQt.png /app/share/icons/hicolor/scalable/apps/io.github.hthienloc.JigsawQt.png
    sources:
      - type: dir
        path: .
